timezone = "Asia/Seoul"
language = "ko"
date_format = "%Y-%m-%d"
timestamp_format = "%Y-%m-%d %H:%M:%S %Z"
log_file = "logs/generation.log"
research_root = "research"
default_author = "Codex Research Automation"

[api]
dotenv_path = ".env"
news_lookback_days = 7
dart_disclosure_lookback_days = 30

[api.marketaux]
base_url = "https://api.marketaux.com/v1/news/all"
enabled_env = "MARKETAUX_API_KEY"
language = "en"
limit = 10

[api.massive]
base_url = "https://api.massive.com"
enabled_env = "MASSIVE_API_KEY"
reference_news_path = "/v2/reference/news"
limit = 50

[api.krx]
base_url = "https://data-dbg.krx.co.kr"
enabled_env = "KRX_API_KEY"
kospi_daily_path = "/svc/apis/idx/kospi_dd_trd"

[api.kis]
base_url = "https://openapi.koreainvestment.com:9443"
token_url = "/oauth2/tokenP"
enabled_env = "KIS_APP_KEY"
app_secret_env = "KIS_APP_SECRET"
current_price_path = ""
daily_price_path = ""
index_price_path = ""
investor_flow_path = ""

[market_data.fred]
us10y = "DGS10"
cpi = "CPIAUCSL"
ppi = "PPIACO"
unemployment = "UNRATE"
fed_funds = "FEDFUNDS"
usdkrw = "DEXKOUS"
gold = "GOLDAMGBD228NLBM"

[market_data.news_queries]
"반도체" = "(semiconductor OR HBM OR memory chip OR foundry OR SK hynix OR Samsung Electronics)"
"AI" = "(artificial intelligence OR generative AI OR LLM OR OpenAI OR Nvidia OR Microsoft)"
"로봇" = "(robotics OR humanoid robot OR factory automation OR industrial robot)"
"자동차/현대차" = "(\"Hyundai Motor\" OR Hyundai OR Kia OR EV OR automotive software)"
"바이오/헬스케어" = "(biotech OR healthcare OR clinical trial OR FDA OR pharma licensing OR drug discovery)"
"ETF: SCHD, QQQM, SPYG" = "SCHD OR QQQM OR SPYG"

[[tracked_companies]]
name = "현대차"
dart_name = "현대자동차"
alpha_symbol = "HYMLF"
alpha_search_keywords = ["Hyundai Motor", "005380"]

[[tracked_companies]]
name = "삼성전자"
dart_name = "삼성전자"

[[tracked_companies]]
name = "디앤디파마텍"
dart_name = "디앤디파마텍"

[naming]
daily_pattern = "{date}-{session}.md"
weekly_pattern = "{year}-W{week:02d}.md"
monthly_pattern = "{year}-{month:02d}.md"

[wiki]
base_url = "/wiki"
link_style = "relative"

[sessions.morning]
title = "오전 리서치"
folder = "morning"
template = "templates/morning.md"
summary_hint = "장 시작 전 핵심 체크포인트와 오늘의 가설을 정리합니다."

[sessions.afternoon]
title = "오후 리서치"
folder = "afternoon"
template = "templates/afternoon.md"
summary_hint = "장중 변화와 오전 가설의 수정 여부를 정리합니다."

[sessions.closing]
title = "마감 리서치"
folder = "closing"
template = "templates/closing.md"
summary_hint = "종가 기준 해석과 다음 거래일 준비 사항을 정리합니다."

[periods.weekly]
title = "주간 리서치"
folder = "weekly"
template = "templates/weekly.md"

[periods.monthly]
title = "월간 리서치"
folder = "monthly"
template = "templates/monthly.md"

